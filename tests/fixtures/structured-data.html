<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structured Data Test</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "name": "Acme Corp",
        "url": "https://acme.example.com/"
      },
      {
        "@type": "WebSite",
        "name": "Acme",
        "url": "https://acme.example.com/"
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home" }
        ]
      }
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Widget"
  }
  </script>
</head>
<body><h1>Product</h1></body>
</html>
